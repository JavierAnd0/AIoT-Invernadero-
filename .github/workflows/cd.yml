name: CD — Deploy a Producción

on:
  push:
    branches: [ main, Javier ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Deploy Frontend a Vercel
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy a Vercel (producción)
        working-directory: greenhouse_aiot/frontend
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─────────────────────────────────────────────
  # 2. Trigger redeploy en Dokploy (backend)
  # ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Dokploy webhook)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Dokploy redeploy
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if echo "$HTTP_CODE" | grep -qE "^2"; then
            echo "Dokploy deploy triggered successfully"
          else
            echo "Dokploy webhook failed with status $HTTP_CODE"
            exit 1
          fi
