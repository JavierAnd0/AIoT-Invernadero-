name: CI — Build, Test & Lint

on:
  push:
    branches: [ main, develop, "feature/**", Javier ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # 1. Spring Boot Tests (JUnit)
  # ─────────────────────────────────────────────
  spring-boot-test:
    name: Spring Boot — JUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests JUnit
        working-directory: greenhouse_aiot/spring-backend
        run: mvn test -Dfile.encoding=UTF-8

      - name: Subir reporte de tests JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: greenhouse_aiot/spring-backend/target/surefire-reports/



  # ─────────────────────────────────────────────
  # 3. Frontend — Lint & Build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: greenhouse_aiot/frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: greenhouse_aiot/frontend
        run: npm ci

      - name: Lint
        working-directory: greenhouse_aiot/frontend
        run: npm run lint

      - name: Build de producción
        working-directory: greenhouse_aiot/frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # 4. Tests Selenium (E2E)
  # ─────────────────────────────────────────────
  selenium-test:
    name: Selenium — Tests E2E
    runs-on: ubuntu-latest
    needs: [spring-boot-test, frontend-build]
    continue-on-error: true

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21 (para Spring Boot)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configurar Python 3.11 (para Selenium)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configurar Node.js (para frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: greenhouse_aiot/frontend/package-lock.json

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Levantar base de datos
        run: |
          docker compose -f docker-compose.yml up -d greenhouse-db
          echo "Esperando que PostgreSQL esté healthy..."
          timeout 60 bash -c 'until docker compose -f docker-compose.yml ps greenhouse-db | grep -q "healthy"; do sleep 2; done'
          echo "PostgreSQL listo"

      - name: Compilar Spring Boot
        working-directory: greenhouse_aiot/spring-backend
        run: mvn package -DskipTests -q

      - name: Levantar Spring Boot
        working-directory: greenhouse_aiot/spring-backend
        run: |
          java -jar target/greenhouse-1.0.0.jar &
          echo "Esperando que Spring Boot esté listo en /actuator/health..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health | grep -q "UP"; do sleep 3; done'
          echo "Spring Boot listo"
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/greenhouse_dev
          DB_USERNAME: greenhouse
          DB_PASSWORD: greenhouse_ci
          JWT_SECRET: ci-test-secret-key-for-github-actions-min-256-bits
          FRONTEND_URL: http://localhost:5173

      - name: Levantar frontend
        working-directory: greenhouse_aiot/frontend
        run: |
          npm ci
          npm run build
          npm run preview -- --port 5173 &
          echo "Esperando que el frontend esté listo en :5173..."
          timeout 30 bash -c 'until curl -sf http://localhost:5173 > /dev/null; do sleep 1; done'
          echo "Frontend listo"

      - name: Instalar dependencias Selenium
        working-directory: greenhouse_aiot/frontend/tests/selenium
        run: pip install -r requirements.txt

      - name: Ejecutar tests Selenium
        working-directory: greenhouse_aiot/frontend/tests/selenium
        run: pytest -v --html=selenium-report.html --self-contained-html
        env:
          SELENIUM_BASE_URL: http://localhost:5173

      - name: Subir reporte Selenium
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-report
          path: greenhouse_aiot/frontend/tests/selenium/selenium-report.html
