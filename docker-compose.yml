services:
  greenhouse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-greenhouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-greenhouse_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greenhouse} -d ${POSTGRES_DB:-greenhouse_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  spring-backend:
    build:
      context: greenhouse_aiot/spring-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      greenhouse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://greenhouse-db:5432/${POSTGRES_DB:-greenhouse_dev}
      DB_USERNAME: ${POSTGRES_USER:-greenhouse}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      AI_SCRIPT_PATH: /app/ai/predict_cli.py
      PYTHON_CMD: python3
      SIMULATOR_ENABLED: ${SIMULATOR_ENABLED:-true}
      SIMULATOR_INTERVAL_MS: ${SIMULATOR_INTERVAL_MS:-15000}
    volumes:
      - ./greenhouse_aiot/ai:/app/ai:ro
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
