<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreenCore — AIoT Greenhouse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f1; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes ping  { 75%, 100% { transform: scale(2); opacity: 0; } }

      /* ── CSS custom properties ── */
      :root {
        --bg-page:        #f0f4f1;
        --bg-card:        #ffffff;
        --bg-card-alt:    #f4f7f5;
        --bg-sidebar:     #08160d;
        --border:         #e5f0e8;
        --text-primary:   #111827;
        --text-secondary: #6b7280;
        --text-muted:     #9ca3af;
        --input-bg:       #fafafa;
        --input-border:   #d1d5db;
        --row-hover:      #f9fafb;
        --danger-bg:      #fee2e2;
        --danger-text:    #b91c1c;
        --danger-border:  #fca5a5;
        --success-bg:     #f0fdf4;
        --success-text:   #16a34a;
        --success-border: #bbf7d0;
      }

      [data-theme="dark"] {
        --bg-page:        #0b1120;
        --bg-card:        #162032;
        --bg-card-alt:    #1a2a40;
        --bg-sidebar:     #08160d;
        --border:         #263348;
        --text-primary:   #e2e8f0;
        --text-secondary: #8da4bf;
        --text-muted:     #506070;
        --input-bg:       #0f1a2e;
        --input-border:   #2d4060;
        --row-hover:      #1a2a40;
        --danger-bg:      #3f0d0d;
        --danger-text:    #f87171;
        --danger-border:  #7f1d1d;
        --success-bg:     #052e16;
        --success-text:   #4ade80;
        --success-border: #166534;
      }

      body { background: var(--bg-page); color: var(--text-primary); transition: background 0.2s, color 0.2s; }
      input, select, textarea, button { transition: background 0.2s, color 0.2s, border-color 0.2s; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
