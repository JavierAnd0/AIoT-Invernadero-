spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/greenhouse_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  messages:
    basename: i18n/messages
    encoding: UTF-8
    use-code-as-default-message: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/api/v1/auth/oauth2/callback/google"

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:aiot-greenhouse-super-secret-key-change-in-production-min-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  flask-service-url: ${FLASK_SERVICE_URL:http://localhost:5001}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.aiot.greenhouse: INFO
    org.springframework.security: WARN
